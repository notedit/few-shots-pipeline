audio_extract:
  sample_rate: 16000
  channels: 1

speaker_extract:
  diarization_model: "pyannote/speaker-diarization-3.1"
  embedding_model: "pyannote/wespeaker-voxceleb-resnet34-LM"
  similarity_threshold: 0.60  # 说话人余弦相似度阈值，建议 0.40~0.60
  hf_token: ""  # set HF_TOKEN env var or fill in here

denoise:
  model_name: "MossFormer2_SE_48K"  # via clearvoice package, outputs 48kHz
  chunk_seconds: 30.0

vad:
  min_speech_duration_ms: 250
  min_silence_duration_ms: 150  # tightened for faster speaker-change cuts
  padding_ms: 250
  threshold: 0.5
  trim_padding_ms: 200  # padding kept after post-denoise VAD trim

speaker_trim:
  window_sec: 1.5
  stride_sec: 0.5
  threshold: 0.45
  min_duration_sec: 1.5
  padding_ms: 200

asr:
  whisper_model: "large-v3"
  whisper_device: "auto"          # auto / cuda / cpu
  whisper_compute_type: "float16"
  qwen_model: "Qwen/Qwen3-ASR-1.7B"
  language: "auto"
  similarity_threshold: 0.90
  whisper_only: true              # false = 启用 Qwen3-ASR 双模型交叉校验

llm:
  base_url: "https://openrouter.ai/api/v1"
  model: "anthropic/claude-sonnet-4"
  api_key: ""  # Set your OpenRouter API key here
  batch_size: 20
  temperature: 0.3

output_dir: "output"
